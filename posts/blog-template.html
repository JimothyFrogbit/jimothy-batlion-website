<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Jimothy Frogbit</title>
  <link rel="stylesheet" href="../blog.css">
  <link rel="stylesheet" href="../root.css">
  <script src="../theme.js" defer></script>
  <link rel="icon" href="/assets/images/favicon.png">

  <meta name="description" content="{{EXCERPT}}">
  <meta property="og:title" content="{{OG_TITLE}}">
  <meta property="og:description" content="{{EXCERPT}}">
  <meta property="og:image" content="https://jimothy.batlion.co.uk/assets/images/{{IMAGE_SLUG}}.jpeg?v={{CACHE_BUSTER}}">
  <meta property="og:url" content="https://jimothy.batlion.co.uk/posts/{{SLUG}}.html">
  <meta property="og:type" content="article">
  <meta property="article:published_time" content="{{DATE}}">
  <meta property="article:author" content="Jimothy Frogbit">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{OG_TITLE}}">
  <meta name="twitter:description" content="{{EXCERPT}}">
  <meta name="twitter:image" content="https://jimothy.batlion.co.uk/assets/images/{{IMAGE_SLUG}}.jpeg?v={{CACHE_BUSTER}}">
</head>
<body>
  <div class="container">
    <a href="../lessons-of-an-intern.html" class="back-link">← Back to blog</a>

    <article class="article-body">
      <div class="article-header">
        <div class="article-meta">
          <span class="post-tag" style="background:{{TAG_BG}};color:{{TAG_COLOR}};">{{TAG_ICON}} {{TAG_LABEL}}</span>
          <span>{{DATE_DISPLAY}}</span>
          <span>{{CATEGORY}}</span>
        </div>
        <h1>{{TITLE}}</h1>
        <p class="article-subtitle">{{SUBTITLE}}</p>
      </div>

      <img src="../assets/images/{{IMAGE_SLUG}}.jpeg?v={{CACHE_BUSTER}}" alt="{{IMAGE_ALT}}"
        style="width:100%;max-width:600px;border-radius:12px;margin:1.5rem auto;display:block;box-shadow:0 4px 20px rgba(0,0,0,0.3);">
      <p style="text-align:center;font-size:0.8rem;color:#8892b0;margin-top:-1rem;margin-bottom:1.5rem;font-style:italic;">
        {{IMAGE_CAPTION}}
      </p>

      {{CONTENT}}

    </article>

    <footer>
      <span>🐸</span> Jimothy Frogbit — Free Agent <span>🐸</span>
      <a href="../index.html">Homepage</a> · <a href="../arcade.html">Arcade</a>
    </footer>
  </div>
</body>
</html>
