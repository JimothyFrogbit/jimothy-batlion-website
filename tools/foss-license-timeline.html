<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOSS License Evolution Timeline</title>
  <meta name="description" content="Interactive timeline of Free and Open-Source Software licensing — from the GNU Manifesto to FreeBSD 16 going GPL-free. 40 years of licensing evolution.">
  <link rel="icon" href="/assets/images/favicon.png">
  <link rel="stylesheet" href="../root.css">
  <script src="../theme.js" defer></script>
  <style>
    :root {
      --bg: #0f1a15;
      --card: #16231e;
      --border: #2a3d35;
      --text: #c8d6d0;
      --text-dim: #7a8a82;
      --accent: #52b788;
      --copyleft: #ef4444;
      --copyleft-bg: rgba(239,68,68,0.1);
      --permissive: #22c55e;
      --permissive-bg: rgba(34,197,94,0.1);
      --event: #f59e0b;
      --event-bg: rgba(245,158,11,0.1);
      --line: #2a3d35;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      line-height: 1.6;
      font-size: 0.9rem;
    }

    h1 { font-size: 1.5rem; margin-bottom: 4px; color: #e0f0e8; }
    .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 8px; }
    .back-link { color: var(--accent); text-decoration: none; font-size: 0.85rem; }
    .back-link:hover { text-decoration: underline; }

    /* Controls */
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 20px 0;
    }
    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.78rem;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(82,183,136,0.1); }
    .filter-btn.copyleft.active { border-color: var(--copyleft); color: var(--copyleft); }
    .filter-btn.permissive.active { border-color: var(--permissive); color: var(--permissive); }
    .filter-btn.event.active { border-color: var(--event); color: var(--event); }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      font-size: 0.75rem;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%;
      display: inline-block;
    }
    .legend-dot.copyleft { background: var(--copyleft); }
    .legend-dot.permissive { background: var(--permissive); }
    .legend-dot.event { background: var(--event); }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 60px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 28px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--line);
    }

    .entry {
      position: relative;
      padding: 0 0 32px;
      opacity: 0.7;
      transition: opacity 0.3s;
      cursor: pointer;
    }
    .entry:hover { opacity: 1; }
    .entry.visible { opacity: 1; }
    .entry.hidden { display: none; }
    .entry.highlight {
      background: rgba(82,183,136,0.05);
      border-radius: 8px;
      padding: 12px 16px 12px 0;
      margin-left: -16px;
    }

    .entry-dot {
      position: absolute;
      left: -48px;
      top: 6px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg);
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.5rem;
      transition: all 0.2s;
    }
    .entry:hover .entry-dot {
      transform: scale(1.25);
      box-shadow: 0 0 12px rgba(82,183,136,0.3);
    }
    .entry-dot.copyleft { border-color: var(--copyleft); }
    .entry-dot.permissive { border-color: var(--permissive); }
    .entry-dot.event { border-color: var(--event); }

    .entry-year {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 2px;
    }
    .entry-title {
      font-weight: 600;
      color: #e0f0e8;
      margin-bottom: 2px;
    }
    .entry-title .icon { margin-right: 6px; }
    .entry-tag {
      display: inline-block;
      font-size: 0.6rem;
      padding: 1px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .entry-tag.copyleft { background: var(--copyleft-bg); color: var(--copyleft); }
    .entry-tag.permissive { background: var(--permissive-bg); color: var(--permissive); }
    .entry-tag.event { background: var(--event-bg); color: var(--event); }

    .entry-desc {
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.5;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, margin 0.3s ease;
      margin-top: 0;
    }
    .entry.expanded .entry-desc {
      max-height: 300px;
      margin-top: 6px;
    }

    .entry-detail {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 6px;
      font-size: 0.82rem;
      line-height: 1.5;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .entry.expanded .entry-detail {
      max-height: 500px;
    }
    .entry-detail p { color: var(--text-dim); margin-bottom: 6px; }
    .entry-detail p:last-child { margin-bottom: 0; }
    .entry-detail .significance {
      color: var(--accent);
      font-weight: 600;
    }

    /* Today marker */
    .today-marker {
      position: absolute;
      left: 20px;
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 50%;
      z-index: 2;
      box-shadow: 0 0 12px rgba(82,183,136,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      color: #0f1a15;
      font-weight: 700;
    }
    .today-label {
      position: absolute;
      left: 60px;
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 20px;
      margin: 16px 0 24px;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.78rem;
    }
    .stat-item { color: var(--text-dim); }
    .stat-item strong { color: var(--text); }

    /* Responsive */
    @media (max-width: 600px) {
      body { padding: 24px 16px 60px; }
      .timeline { padding-left: 48px; }
      .timeline::before { left: 22px; }
      .entry-dot { left: -40px; width: 14px; height: 14px; top: 4px; }
      .entry { padding: 0 0 24px; }
      .today-marker { left: 15px; width: 16px; height: 16px; font-size: 0.5rem; }
      .today-label { left: 48px; }
    }
  </style>
</head>
<body>
  <a href="/projects.html" class="back-link">← Back to Projects</a>
  <h1>🔓 FOSS License Evolution Timeline</h1>
  <p class="subtitle">40 years of free and open-source licensing — from the GNU Manifesto to FreeBSD 16 going GPL-free. Click entries for details.</p>

  <div class="controls" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn copyleft" data-filter="copyleft">🔴 Copyleft</button>
    <button class="filter-btn permissive" data-filter="permissive">🟢 Permissive</button>
    <button class="filter-btn event" data-filter="event">🟡 Events</button>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="legend-dot copyleft"></span> Copyleft</span>
    <span class="legend-item"><span class="legend-dot permissive"></span> Permissive</span>
    <span class="legend-item"><span class="legend-dot event"></span> Events</span>
  </div>

  <div class="stats-bar" id="stats">
    <span class="stat-item">📅 <strong id="stat-total">0</strong> milestones</span>
    <span class="stat-item">🔴 <strong id="stat-copyleft">0</strong> copyleft</span>
    <span class="stat-item">🟢 <strong id="stat-permissive">0</strong> permissive</span>
    <span class="stat-item">🟡 <strong id="stat-event">0</strong> events</span>
  </div>

  <div class="timeline" id="timeline"></div>

  <script>
    const milestones = [
      {
        year: '1980', icon: '🔐',
        title: 'UNIX Re-licensed',
        category: 'event',
        tag: 'Event',
        desc: 'AT&T restricts UNIX source access under copyright, sparking the movement for freely available operating systems.',
        detail: 'The 1974 US Copyright Act extension meant AT&T could enforce tighter UNIX licensing. Universities and researchers who had relied on source access suddenly faced restrictive, expensive licenses. This directly motivated Richard Stallman to begin the GNU project three years later.'
      },
      {
        year: '1983', icon: '📯',
        title: 'GNU Project Announced',
        category: 'event',
        tag: 'Event',
        desc: 'Richard Stallman announces the GNU Project on September 27 — "the Free Software movement is born."',
        detail: 'Stallman\'s initial announcement on net.unix-wizards called for "a sufficient body of free software" so users could run a UNIX-compatible system without proprietary restrictions. The recursive acronym "GNU\'s Not UNIX" was chosen because it was hacker humour and technically accurate.'
      },
      {
        year: '1985', icon: '📜',
        title: 'GNU Manifesto Published',
        category: 'event',
        tag: 'Event',
        desc: 'Stallman publishes the GNU Manifesto in Dr. Dobb\'s Journal, defining free software philosophy — four freedoms: run, study, redistribute, improve.',
        detail: 'The four essential freedoms: (0) run the program for any purpose, (1) study and modify the source, (2) redistribute copies, (3) distribute modified versions. The manifesto argued that software hoarding was antisocial and that the hacker community had a moral duty to share.'
      },
      {
        year: '1989', icon: '⛓️',
        title: 'GPLv1',
        category: 'copyleft',
        tag: 'Copyleft',
        desc: 'First GNU General Public License. Introduces "copyleft" — use copyright law to ensure freedom, not restrict it. Viral clause: derivatives must use same license.',
        detail: 'GPLv1 was a radical legal innovation: instead of using copyright to restrict users, Stallman used it to guarantee freedom. The "viral" requirement that derivative works must also be GPL-licensed was deliberately designed so no proprietary vendor could take free software and close it. The preamble explicitly states the license "is not a copyright at all" — it\'s a freedom guarantee.'
      },
      {
        year: '1991', icon: '⚔️',
        title: 'GPLv2',
        category: 'copyleft',
        tag: 'Copyleft',
        desc: 'GPLv2 published June 1991. "Liberty or Death" clause (section 7): if legal restrictions prevent freedom, you cannot redistribute at all. Linux adopts it.',
        detail: 'GPLv2\'s Section 7 was written in response to threats that proprietary vendors might use patent or contract law to impose additional restrictions. The clause says: if a court order or patent prevents you from exercising the GPL\'s freedoms, you cannot redistribute the program. This "liberty or death" approach became the defining principle of copyleft enforcement for the next 30+ years.'
      },
      {
        year: '1991', icon: '🐧',
        title: 'Linux Released Under GPLv2',
        category: 'event',
        tag: 'Event',
        desc: 'Linus Torvalds releases Linux under the GPLv2. The kernel that would define open source adopted the license that would define the movement.',
        detail: 'Torvalds switched Linux from a non-commercial license to GPLv2 in early 1992. He has called it "the best thing I ever did" — the GPL ensured that companies contributing to Linux had to share their improvements. This decision is widely credited with preventing fragmentation and making Linux the most successful collaborative software project in history.'
      },
      {
        year: '1992', icon: '⚖️',
        title: 'BSD Lawsuit (USL v. BSDi)',
        category: 'event',
        tag: 'Event',
        desc: 'AT&T\'s UNIX subsidiary sues BSDi over BSD/386. Settlement in 1994 removes AT&T code, creating the modern BSD license. The lawsuit delayed BSD adoption and gave Linux its window.',
        detail: 'The lawsuit alleged BSDi\'s Net/2 release contained proprietary AT&T code. The 1994 settlement required BSDi to relicense a small number of files from AT&T. The legal uncertainty around BSD during this period is widely considered the reason Linux, not a free BSD, became the dominant open-source kernel. The BSD license family emerged from this cleanup.'
      },
      {
        year: '1998', icon: '🌐',
        title: 'Open Source Initiative Founded',
        category: 'event',
        tag: 'Event',
        desc: 'OSI founded by Eric Raymond and Bruce Perens. "Open source" coined as a pragmatic alternative to "free software" — focused on development methodology, not moral philosophy.',
        detail: 'The term "open source" was a deliberate rebranding after Netscape\'s 1998 source release. The OSI\'s Open Source Definition (based on Debian\'s Social Contract) established 10 criteria for license approval. This split from the FSF\'s "free software" framing remains one of the most significant philosophical divides in the community — the FSF emphasises moral imperative, while OSI focuses on practical collaboration benefits.'
      },
      {
        year: '1999', icon: '🦊',
        title: 'MPL 1.0 (Mozilla Public License)',
        category: 'copyleft',
        tag: 'File-Level',
        desc: 'Netscape open-sources Mozilla under MPL 1.0. A "weak copyleft" — modifications to MPL files must be shared, but combining MPL with proprietary code in larger works is allowed.',
        detail: 'The MPL was designed as a compromise between the GPL (too restrictive for corporate adoption) and BSD/MIT (too permissive — let proprietary vendors take without giving back). MPL\'s file-level copyleft means only changes to MPL-licensed files need to be shared back. This made it palatable to corporations while still protecting community contributions. MPL 2.0 followed in 2012, simplifying cross-license compatibility.'
      },
      {
        year: '2004', icon: '📋',
        title: 'Apache License 2.0',
        category: 'permissive',
        tag: 'Permissive',
        desc: 'Apache License 2.0 — permissive license with explicit patent grant. Patent retaliation clause: sue over patents, lose your license. Becomes standard for Apache Software Foundation projects.',
        detail: 'Apache 2.0 was a landmark in license design. Its express patent grant meant contributors explicitly licensed their patents to users — a protection the MIT and BSD licenses lacked. The patent retaliation clause (section 3) discouraged patent litigation within the ecosystem. It became the default license for Apache projects, Android, and Kubernetes, and is the most common permissive license for enterprise open source.'
      },
      {
        year: '2007', icon: '🔓',
        title: 'GPLv3 Published',
        category: 'copyleft',
        tag: 'Copyleft',
        desc: 'GPLv3 addresses tivoization, DRM, and patent retaliation. Controversial — Linux kernel explicitly stays GPLv2. "The license that split the community."',
        detail: 'GPLv3\'s four major changes: (1) anti-tivoization — requires installable user-modified versions on devices, (2) patent retaliation — terminate license if you sue for patent infringement, (3) compatibility — explicit compatibility with Apache 2.0, (4) DRM — GPLv3-covered code cannot be used in DRM systems you\'d need a law to break. Linus Torvalds rejected it for the kernel, calling the anti-tivoization clause "not my fight." This created the GPLv2/v3 split that persists today.'
      },
      {
        year: '2007', icon: '📚',
        title: 'LGPLv3 Published',
        category: 'copyleft',
        tag: 'Weak Copyleft',
        desc: 'Lesser GPLv3, following GPLv3\'s changes. For libraries: linking from proprietary code is allowed. Used by glibc, GTK, and many core system libraries.',
        detail: 'The LGPL was designed specifically for software libraries — the FSF recognised that requiring libraries to be GPL would make them unusable by anyone writing proprietary code, which would actually reduce their adoption. LGPLv3 follows GPLv3\'s anti-tivoization and patent provisions but allows proprietary linking. It occupies a middle ground between strong copyleft and permissive licensing.'
      },
      {
        year: '2009', icon: '🌍',
        title: 'AGPLv3 Published',
        category: 'copyleft',
        tag: 'Network Copyleft',
        desc: 'Affero GPLv3 closes the "ASP loophole" — if you run modified AGPL software as a network service, you must distribute your modifications. Designed for web applications.',
        detail: 'The "ASP loophole" means companies like Google and Facebook could take GPL software, modify it heavily, run it as a web service, and never distribute the binary — thus never triggering GPL\'s distribution requirement to share modifications. AGPLv3 closes this by defining "interaction over a network" as distribution. MongoDB adopted AGPLv3, but the controversy over "non-commercial" interpretation led to the later SSPL fork.'
      },
      {
        year: '2012', icon: '📝',
        title: 'MIT License Goes Mainstream',
        category: 'permissive',
        tag: 'Permissive',
        desc: 'Node.js, React, jQuery, and the npm ecosystem cement the MIT License as the default permissive choice. Minimal restrictions: do whatever you want, include the copyright notice, don\'t sue us.',
        detail: 'The MIT License is the simplest — one paragraph, ~200 words. Its rise to dominance mirrors the rise of JavaScript and the npm package ecosystem, where hundreds of thousands of tiny libraries needed a zero-friction license. By the 2020s, MIT became the single most-used open-source license on GitHub. Critics argue its simplicity lacks explicit patent grants and trademark protections, but its minimalism is precisely why it won.'
      },
      {
        year: '2013', icon: '🔄',
        title: 'MPL 2.0 Released',
        category: 'copyleft',
        tag: 'Weak Copyleft',
        desc: 'MPL 2.0 simplifies cross-license compatibility. File-level copyleft with explicit patent grant. GPL-compatible by design — MPL files can be included in GPL projects.',
        detail: 'MPL 2.0 was a significant cleanup. It added an explicit patent grant, improved GPL compatibility (section 3.3: GPL-licensed code may be combined with MPL-licensed code), and removed the complex "Netsose Public License" variations. The file-level copyleft remains — modifications to MPL files must be shared, but larger works combining MPL with proprietary code are fine without triggering copyleft on the whole.'
      },
      {
        year: '2018', icon: '⚡',
        title: 'SSPL Controversy (MongoDB)',
        category: 'event',
        tag: 'Event',
        desc: 'MongoDB moves from AGPL to the Server Side Public License. SSPL is not considered "open source" by OSI. Cloud vendors can use it freely — unless they offer it as a service. Major controversy ensues.',
        detail: 'The SSPL explicitly targeted the "cloud provider loophole" — companies like AWS could offer MongoDB-as-a-service without contributing back. SSPL requires that if you offer the software as a service, you must open-source ALL the software used to provide that service, including management, monitoring, and orchestration layers. OSI rejected SSPL as non-open-source. This split the community: was Mongo defending its business, or undermining the open-source definition?'
      },
      {
        year: '2021', icon: '🏢',
        title: 'Source-Available Licenses Rise',
        category: 'event',
        tag: 'Event',
        desc: 'Elastic (ELv2), CockroachDB (BSL), Sentry (BSL), and others adopt "fair-code" or "source-available" licenses. Code is visible but cannot be used commercially as-a-service without a license.',
        detail: 'BUSL/BSL (Business Source License) created by MariaDB: the code is source-available for a limited time (usually 3-4 years), after which it automatically converts to a standard open-source license (GPL or Apache). This timing gives the company a head start while still eventually producing open-source code. Critics argue these aren\'t "open source" at all. The BSL has been controversial but adopted by MariaDB, CockroachDB, Sentry, and others as a compromise between open source and sustainability.'
      },
      {
        year: '2024', icon: '🦀',
        title: 'Rust Foundation MIT/Apache 2.0',
        category: 'permissive',
        tag: 'Permissive',
        desc: 'Rust Foundation formalises MIT / Apache 2.0 dual license as the standard. Dual licensing gives users choice: use Apache 2.0\'s patent protections or MIT\'s simplicity.',
        detail: 'Rust\'s dual-license model lets licensees choose which terms work for them — Apache 2.0 for those who want explicit patent grants, MIT for those who want maximum simplicity. The Rust Foundation explicitly chose this over the GPL family because they wanted maximum adoption in the systems programming space. By 2026, Rust is the fastest-growing language with 3.5M+ developers, and its licensing choice is credited as a factor in corporate adoption.'
      },
      {
        year: '2026', icon: '🔓',
        title: 'FreeBSD 16 Goes GPL-Free',
        category: 'event',
        tag: 'Event',
        desc: 'FreeBSD 16 removes the last GPL-licensed code from its base system. The entire OS now ships entirely under the BSD license. Decades of incremental replacement culminate in a fully permissive OS.',
        detail: 'The final holdouts were GNU tools like diff, grep, and binutils that hadn\'t yet been replaced by BSD-licensed equivalents. FreeBSD\'s GPL removal was decades in the making — each release chipped away at GPL dependencies. The milestone means FreeBSD has zero copyleft licensing in its base system, giving it cleaner legal standing for embedded, IoT, and commercial use. The BSD community has maintained a philosophical preference for permissive licenses since the 1992 USL lawsuit. FreeBSD 16 is the culmination of that 34-year arc. 🎉',
        highlight: true
      }
    ];

    const timeline = document.getElementById('timeline');
    const statsTotal = document.getElementById('stat-total');
    const statsCopyleft = document.getElementById('stat-copyleft');
    const statsPermissive = document.getElementById('stat-permissive');
    const statsEvent = document.getElementById('stat-event');
    const filterBtns = document.querySelectorAll('.filter-btn');

    function countCategory(cat) {
      return milestones.filter(m => m.category === cat).length;
    }
    statsTotal.textContent = milestones.length;
    statsCopyleft.textContent = countCategory('copyleft');
    statsPermissive.textContent = countCategory('permissive');
    statsEvent.textContent = countCategory('event');

    function render(filter) {
      timeline.innerHTML = '';
      milestones.forEach((m, i) => {
        const show = filter === 'all' || m.category === filter;
        const el = document.createElement('div');
        el.className = 'entry visible' + (show ? '' : ' hidden');
        if (m.highlight) el.className += ' highlight';
        el.dataset.category = m.category;

        const dotClass = m.category;
        el.innerHTML = `
          <div class="entry-dot ${dotClass}">${m.icon}</div>
          <div class="entry-year">${m.year}</div>
          <div class="entry-title"><span class="icon">${m.icon}</span>${m.title}<span class="entry-tag ${m.category}">${m.tag}</span></div>
          <div class="entry-desc">${m.desc}</div>
          <div class="entry-detail"><p>${m.detail}</p></div>
        `;

        el.addEventListener('click', () => {
          el.classList.toggle('expanded');
        });

        timeline.appendChild(el);
      });
    }

    // Filters
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(btn.dataset.filter);
      });
    });

    // Initial render
    render('all');
  </script>
</body>
</html>
