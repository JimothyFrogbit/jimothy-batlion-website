<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimi K3 Benchmark Explorer — Moonshot AI's 2.8T Open Model</title>
<link rel="stylesheet" href="../root.css">
<link rel="stylesheet" href="../blog.css">
<script src="../theme.js" defer></script>
<meta name="description" content="Interactive benchmark comparison for Kimi K3 — the first open 3T-class model from Moonshot AI. Compare across coding, agentic, reasoning, and vision benchmarks.">
<meta property="og:title" content="Kimi K3 Benchmark Explorer">
<meta property="og:description" content="Interactive comparison tool for Moonshot AI's 2.8T open-weights model vs Claude Fable 5, GPT 5.6 Sol, Opus 4.8, and GLM-5.2.">
<meta property="og:image" content="../images/kimi-k3-og.png">
<meta name="twitter:card" content="summary_large_image">
<style>
:root { --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
body { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }
h1 { font-size: 2rem; margin-bottom: 0.25rem; }
.subtitle { color: var(--text-dim); margin-bottom: 2rem; font-size: 0.95rem; }
.controls { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
.control-group { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
.control-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-dim); }
select, .btn { padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 0.85rem; cursor: pointer; }
.btn { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
.btn:hover { opacity: 0.85; }
.btn.active { background: var(--accent-dim); }
.category-tabs { display: flex; gap: 2px; margin-bottom: 0; flex-wrap: wrap; }
.category-tab { padding: 0.5rem 1rem; border: 1px solid var(--border); background: var(--bg-card); cursor: pointer; font-size: 0.85rem; border-radius: 6px 6px 0 0; }
.category-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.category-tab:not(.active):hover { background: var(--bg-hover); }
.chart-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 0 6px 6px 6px; padding: 1.5rem; overflow-x: auto; }
.bar-chart { min-width: 600px; }
.bar-group { margin-bottom: 1.2rem; }
.bar-label { display: flex; justify-content: space-between; margin-bottom: 0.25rem; font-size: 0.85rem; }
.bar-label .name { font-weight: 600; }
.bar-label .score { font-family: var(--font-mono); font-size: 0.8rem; }
.bar-track { height: 22px; background: var(--bg); border-radius: 4px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; display: flex; align-items: center; padding-left: 6px; font-size: 0.7rem; font-family: var(--font-mono); color: rgba(255,255,255,0.9); min-width: fit-content; }
.bar-fill.k3 { background: linear-gradient(90deg, #6366f1, #818cf8); }
.bar-fill.f5 { background: linear-gradient(90deg, #d97706, #f59e0b); }
.bar-fill.gpt56 { background: linear-gradient(90deg, #059669, #10b981); }
.bar-fill.op48 { background: linear-gradient(90deg, #6b7280, #9ca3af); }
.bar-fill.glm52 { background: linear-gradient(90deg, #0891b2, #22d3ee); }
.legend { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; padding: 1rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; }
.legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; }
.legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
.benchmark-title { font-size: 1.1rem; font-weight: 700; margin: 1.5rem 0 0.5rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--border); }
.benchmark-desc { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.8rem; }
.null-score { opacity: 0.4; }
.stats-row { display: flex; gap: 2rem; flex-wrap: wrap; margin: 1rem 0; padding: 1rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; }
.stat-item { text-align: center; }
.stat-value { font-size: 1.5rem; font-weight: 700; font-family: var(--font-mono); }
.stat-label { font-size: 0.75rem; color: var(--text-dim); }
@media (max-width: 700px) { .category-tabs { flex-wrap: wrap; } .category-tab { flex: 1; text-align: center; } }
</style>
</head>
<body>
<h1>🧪 Kimi K3 Benchmark Explorer</h1>
<p class="subtitle">Moonshot AI's 2.8T-parameter open-weights model vs frontier — 16 Jul 2026</p>

<div class="legend">
  <div class="legend-item"><span class="legend-swatch" style="background:#6366f1"></span> Kimi K3 (max)</div>
  <div class="legend-item"><span class="legend-swatch" style="background:#d97706"></span> Claude Fable 5</div>
  <div class="legend-item"><span class="legend-swatch" style="background:#059669"></span> GPT 5.6 Sol</div>
  <div class="legend-item"><span class="legend-swatch" style="background:#6b7280"></span> Claude Opus 4.8</div>
  <div class="legend-item"><span class="legend-swatch" style="background:#0891b2"></span> GLM-5.2</div>
</div>

<div class="category-tabs" id="categoryTabs"></div>
<div class="chart-container" id="chartContainer"></div>

<div class="stats-row" id="statsRow"></div>

<script>
const BENCHMARKS = {
  coding: {
    label: '💻 Coding',
    desc: 'Software engineering, terminal automation, code generation',
    items: [
      { name: 'DeepSWE', key: 'deepswe', desc: 'Real-world software engineering benchmark — agent diagnoses, edits, and tests PRs against codebases', k3: 67.3, f5: 63.8, gpt56: 85.5, op48: 55.9, glm52: null, max: 100 },
      { name: 'Terminal-Bench 2.1', key: 'terminalbench', desc: 'Terminal-based task automation — CLI operations, file manipulation, environment setup', k3: 39.5, f5: 49.6, gpt56: 30.1, op48: 38.0, glm52: null, max: 100 },
      { name: 'Program Bench', key: 'programbench', desc: 'Multi-language program synthesis from natural language specs', k3: 63.5, f5: 68.2, gpt56: 62.3, op48: null, glm52: 47.1, max: 100 },
      { name: 'SWE Marathon', key: 'swemarathon', desc: 'Extended software engineering — multi-step fixes across 10+ languages', k3: 43.2, f5: 46.5, gpt56: 39.5, op48: 30.7, glm52: 24.1, max: 100 },
      { name: 'FrontierSWE', key: 'frontierswe', desc: 'Challenging SWE benchmark — long-context, multi-file, multi-repo tasks', k3: 32.4, f5: 32.9, gpt56: 40.0, op48: 25.2, glm52: null, max: 100 },
      { name: 'KCB 2.0', key: 'kcb20', desc: 'Kimi Coding Benchmark — comprehensive coding eval across languages', k3: 73.5, f5: 73.0, gpt56: 74.7, op48: 66.9, glm52: 68.6, max: 100 },
    ]
  },
  agentic: {
    label: '🤖 Agentic',
    desc: 'Autonomous task completion, tool use, office productivity',
    items: [
      { name: 'MCP Atlas', key: 'mcp-atlas', desc: '500-task MCP tool-use benchmark — API calls, data manipulation, multi-step tool orchestration', k3: 73.2, f5: 77.9, gpt56: 74.9, op48: 76.2, glm52: 59.9, max: 100 },
      { name: 'AutomationBench', key: 'automation-bench', desc: '600-task automation benchmark — browser automation, file ops, system tasks', k3: 84.2, f5: 84.7, gpt56: 83.6, op48: 83.6, glm52: 82.6, max: 100 },
      { name: 'Job Bench', key: 'job-bench', desc: 'End-to-end job-completion benchmark across professional domains', k3: 52.9, f5: 57.4, gpt56: 46.5, op48: 48.4, glm52: 43.4, max: 100 },
      { name: 'AA-Briefcase', key: 'aa-briefcase', desc: 'Artificial Analysis — knowledge work briefcase benchmark', k3: 30.8, f5: 29.1, gpt56: 29.7, op48: 27.2, glm52: 12.9, max: 100 },
      { name: 'PostTrain Bench', key: 'posttrain-bench', desc: 'Post-training knowledge retention — how well models generalise after fine-tuning', k3: 37.6, f5: 43.3, gpt56: 39.9, op48: 39.4, glm52: 35.6, max: 100 },
      { name: 'MLS Bench Lite', key: 'mls-bench', desc: 'Multi-language support benchmark — translation, code-switching, cultural context', k3: 45.6, f5: null, gpt56: null, op48: null, glm52: null, max: 100 },
      { name: 'OfficeQA Pro', key: 'officeqa', desc: 'Office productivity — spreadsheet, document, presentation tasks via agent harness', k3: 63.3, f5: 69.9, gpt56: 63.2, op48: 63.9, glm52: 41.4, max: 100 },
      { name: 'SpreadsheetBench 2', key: 'spreadsheet', desc: 'Spreadsheet manipulation — formulas, macros, data cleaning, visualisation', k3: 34.8, f5: 34.7, gpt56: 32.4, op48: 31.55, glm52: 28.12, max: 100 },
      { name: 'DEC-Ops (Internal)', key: 'dec-ops', desc: 'Kimi internal decision operations benchmark', k3: 73.5, f5: 73.0, gpt56: 74.7, op48: 66.9, glm52: 68.6, max: 100 },
    ]
  },
  reasoning: {
    label: '🧠 Reasoning & Knowledge',
    desc: 'Scientific reasoning, hard knowledge, long-form comprehension',
    items: [
      { name: 'GPQA-Diamond', key: 'gpqa', desc: 'Graduate-level physics, chemistry, biology — expert-crafted, non-trivial questions', k3: 93.5, f5: 92.6, gpt56: 94.1, op48: 91.0, glm52: 91.2, max: 100 },
      { name: 'HLE-Full', key: 'hle', desc: 'Humanity\'s Last Exam — hardest questions AI has not yet mastered, multi-domain', k3: 43.5, f5: 53.3, gpt56: 44.5, op48: 49.8, glm52: null, max: 100 },
      { name: 'HLE-Full w/ tools', key: 'hle-tools', desc: 'HLE with tool access — web search, calculator, code execution', k3: 56.0, f5: 63.0, gpt56: 58.0, op48: 57.9, glm52: null, max: 100 },
    ]
  },
  vision: {
    label: '👁️ Vision & Multimodal',
    desc: 'Image understanding, chart reasoning, multimodal comprehension',
    items: [
      { name: 'MMMU-Pro', key: 'mmmu-pro', desc: 'College-level multimodal understanding — diagrams, charts, figures across 6 subjects', k3: 81.6, f5: 81.2, gpt56: 83.0, op48: 78.9, glm52: null, max: 100 },
      { name: 'MMMU-Pro w/ python', key: 'mmmu-py', desc: 'MMMU-Pro with Python code execution for computation', k3: 83.4, f5: 86.5, gpt56: 84.6, op48: 82.7, glm52: null, max: 100 },
      { name: 'CharXiv (RQ)', key: 'charxiv', desc: 'Chart interpretation — reading axes, extracting trends, answering questions about visualisations', k3: 84.8, f5: 88.9, gpt56: 84.6, op48: 80.5, glm52: null, max: 100 },
      { name: 'CharXiv w/ python', key: 'charxiv-py', desc: 'CharXiv with Python code execution', k3: 91.3, f5: 93.5, gpt56: 89.1, op48: 89.9, glm52: null, max: 100 },
      { name: 'MathVision', key: 'mathvision', desc: 'Visual maths — geometry, graphs, equations in images', k3: 94.3, f5: 94.8, gpt56: 95.8, op48: 86.7, glm52: null, max: 100 },
      { name: 'MathVision w/ python', key: 'mathvision-py', desc: 'MathVision with Python code execution', k3: 97.8, f5: 98.6, gpt56: 97.8, op48: 97.1, glm52: null, max: 100 },
      { name: 'BabyVision w/ python', key: 'babyvision', desc: 'Fine-grained visual QA — object recognition, spatial reasoning, colour perception', k3: 85.7, f5: 90.5, gpt56: 88.9, op48: 81.2, glm52: null, max: 100 },
      { name: 'ZeroBench (pass@5)', key: 'zerobench', desc: 'Near-zero-shot visual reasoning — hardest multimodal benchmark, 5 attempts', k3: 23.0, f5: 23.0, gpt56: 17.0, op48: 17.0, glm52: null, max: 100 },
      { name: 'ZeroBench w/ python', key: 'zerobench-py', desc: 'ZeroBench with Python execution', k3: 41.0, f5: 46.0, gpt56: 35.0, op48: 34.0, glm52: null, max: 100 },
      { name: 'OmniDocBench', key: 'omnidoc', desc: 'Document understanding — tables, forms, invoices, mixed layouts', k3: 91.1, f5: 89.8, gpt56: 85.8, op48: 87.9, glm52: null, max: 100 },
      { name: 'PerceptionBench', key: 'perception', desc: 'Atomic visual perception — colour, shape, orientation, counting (in-house)', k3: 58.5, f5: 57.2, gpt56: 59.7, op48: 47.2, glm52: null, max: 100 },
      { name: 'WorldVQA', key: 'worldvqa', desc: 'World Knowledge VQA — visual questions requiring real-world knowledge', k3: 51.0, f5: 56.7, gpt56: 41.8, op48: 39.1, glm52: null, max: 100 },
    ]
  }
};

const MODELS = [
  { id: 'k3', label: 'Kimi K3 (max)', cls: 'k3', default: true },
  { id: 'f5', label: 'Claude Fable 5', cls: 'f5', default: true },
  { id: 'gpt56', label: 'GPT 5.6 Sol', cls: 'gpt56', default: true },
  { id: 'op48', label: 'Claude Opus 4.8', cls: 'op48', default: true },
  { id: 'glm52', label: 'GLM-5.2', cls: 'glm52', default: false },
];

let activeCategory = 'coding';
let visibleModels = MODELS.filter(m => m.default).map(m => m.id);

function createTabs() {
  const container = document.getElementById('categoryTabs');
  container.innerHTML = Object.entries(BENCHMARKS).map(([key, cat]) =>
    `<div class="category-tab ${key === activeCategory ? 'active' : ''}" data-cat="${key}">${cat.label}</div>`
  ).join('');
  container.addEventListener('click', e => {
    const tab = e.target.closest('.category-tab');
    if (!tab) return;
    activeCategory = tab.dataset.cat;
    render();
  });
}

function createLegend() {
  // Already hardcoded in HTML
}

function computeStats(catData) {
  const items = catData.items;
  let wins = { k3: 0, f5: 0, gpt56: 0, op48: 0, glm52: 0 };
  items.forEach(item => {
    let best = { id: '', score: -1 };
    ['k3','f5','gpt56','op48','glm52'].forEach(m => {
      if (item[m] !== null && item[m] > best.score) { best = { id: m, score: item[m] }; }
    });
    if (best.id) wins[best.id]++;
  });
  const avg = m => {
    const vals = items.map(i => i[m]).filter(v => v !== null);
    return vals.length ? (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1) : '—';
  };
  return { wins, avg: { k3: avg('k3'), f5: avg('f5'), gpt56: avg('gpt56'), op48: avg('op48'), glm52: avg('glm52') } };
}

function renderStats(catData) {
  const stats = computeStats(catData);
  const el = document.getElementById('statsRow');
  const modelLabels = { k3: 'Kimi K3', f5: 'Fable 5', gpt56: 'GPT 5.6 Sol', op48: 'Opus 4.8', glm52: 'GLM-5.2' };
  el.innerHTML = `<div class="stat-item"><div class="stat-value">${catData.items.length}</div><div class="stat-label">Benchmarks</div></div>` +
    visibleModels.filter(m => stats.avg[m] !== '—').map(m => {
      const isBest = Object.entries(stats.wins).filter(([k]) => visibleModels.includes(k)).every(([k,v]) => v <= stats.wins[m]);
      return `<div class="stat-item"><div class="stat-value" style="color:var(${isBest ? '--accent' : '--text'})">${stats.avg[m]}%</div><div class="stat-label">${modelLabels[m]} avg</div></div>`;
    }).join('') +
    Object.entries(stats.wins).filter(([m]) => visibleModels.includes(m)).map(([m, w]) =>
      `<div class="stat-item"><div class="stat-value">${w}</div><div class="stat-label">${modelLabels[m]} wins</div></div>`
    ).join('');
}

function renderChart(catData) {
  const container = document.getElementById('chartContainer');
  const items = catData.items;
  const modelConfig = { k3: { label: 'Kimi K3 (max)', cls: 'k3' }, f5: { label: 'Claude Fable 5', cls: 'f5' }, gpt56: { label: 'GPT 5.6 Sol', cls: 'gpt56' }, op48: { label: 'Claude Opus 4.8', cls: 'op48' }, glm52: { label: 'GLM-5.2', cls: 'glm52' } };

  let html = `<div class="benchmark-title">${catData.label}</div><div class="benchmark-desc">${catData.desc}</div><div class="bar-chart">`;
  items.forEach(item => {
    html += `<div class="bar-group"><div class="bar-label"><span class="name">${item.name}</span></div><div class="benchmark-desc" style="margin:0 0 0.4rem 0;font-size:0.75rem">${item.desc}</div>`;
    visibleModels.forEach(m => {
      const v = item[m];
      const pct = v !== null ? Math.round((v / (item.max || 100)) * 100) : 0;
      html += `<div class="bar-label"><span style="color:var(--text-dim);font-size:0.8rem">&nbsp;&nbsp;${modelConfig[m].label}</span><span class="score">${v !== null ? v + '%' : '—'}</span></div>`;
      html += `<div class="bar-track"><div class="bar-fill ${modelConfig[m].cls}" style="width:${v !== null ? Math.max(pct, 4) : 0}%">${v !== null ? '' : ''}</div></div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  container.innerHTML = html;
}

function render() {
  const catData = BENCHMARKS[activeCategory];
  if (!catData) return;
  // Update tab active states
  document.querySelectorAll('.category-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === activeCategory));
  renderChart(catData);
  renderStats(catData);
}

// Init
createTabs();
render();
</script>
</body>
</html>
